<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="버튼을 누르면 멜론 앱으로 곡 재생을 시도합니다." />

  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --line: #2a2f3a;
      --text: #ffffff;
      --muted: #c8ceda;
      --sub: #97a0b3;
      --green: #1ed760;
      --green-dark: #15b84f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1a1f2b 0%, var(--bg) 55%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(23, 26, 33, 0.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 30px 24px 26px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(30, 215, 96, 0.12);
      color: var(--green);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.6px;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }
    .song {
      margin: 18px 0 22px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #11141a;
      border: 1px solid #242937;
      text-align: center;
      font-size: 16px;
      color: var(--text);
      font-weight: 700;
    }
    .btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, var(--green) 0%, var(--green-dark) 100%);
      color: #08110b;
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(30, 215, 96, 0.28);
      cursor: pointer;
    }
    .note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--sub);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Melon Redirect</div>
    <h1>멜론에서 바로 듣기</h1>
    <p>Play 버튼을 누르면 멜론 앱으로 곡 재생을 시도합니다.</p>

    <div class="song">CATCH THE YOUNG - 찬란히 빛나줘(Sail)</div>

    <a href="#" class="btn" id="playBtn">Play in Melon</a>

    <div class="note">
      멜론 앱이 설치되어 있으면 앱을 열고, 없으면 웹으로 이동합니다.
    </div>
  </main>

  <script>
    const deepLinkUrl = "melonapp://play?cid=600941690&ctype=1&menuid=2079";
    const fallbackUrl = "https://www.melon.com/song/detail.htm?songId=600941690";

    document.getElementById("playBtn").addEventListener("click", function (e) {
      e.preventDefault();

      fbq('trackCustom', 'PlayClick', {
        content_name: 'CATCH THE YOUNG - 찬란히 빛나줘(Sail)'
      });

      let opened = false;
      const iframe = document.createElement("iframe");
      iframe.style.display = "none";
      iframe.src = deepLinkUrl;
      document.body.appendChild(iframe);

      const timer = setTimeout(function () {
        if (!opened) window.location.href = fallbackUrl;
      }, 1200);

      const onVisibilityChange = function () {
        if (document.hidden) {
          opened = true;
          clearTimeout(timer);
          document.removeEventListener("visibilitychange", onVisibilityChange);
        }
      };

      document.addEventListener("visibilitychange", onVisibilityChange);
    });
  </script>
</body>
</html>
